services:
  api:
    build: .
    ports:
      - "${TEMPINBOX_SMTP_EXTERNAL_PORT:-25}:2525"
    expose:
      - "8000"
    environment:
      TEMPINBOX_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tempinbox}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tempinbox}
      TEMPINBOX_REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379/0
      TEMPINBOX_MASTER_KEY: ${TEMPINBOX_MASTER_KEY:?Set TEMPINBOX_MASTER_KEY}
      TEMPINBOX_SMTP_DOMAINS: ${TEMPINBOX_SMTP_DOMAINS:-["tempinbox.dev"]}
      TEMPINBOX_MESSAGE_TTL_HOURS: ${TEMPINBOX_MESSAGE_TTL_HOURS:-72}
      TEMPINBOX_CLEANUP_INTERVAL_MINUTES: ${TEMPINBOX_CLEANUP_INTERVAL_MINUTES:-30}
      TEMPINBOX_RATE_LIMIT_PER_MINUTE: ${TEMPINBOX_RATE_LIMIT_PER_MINUTE:-60}
      TEMPINBOX_MAX_EMAIL_SIZE: ${TEMPINBOX_MAX_EMAIL_SIZE:-10485760}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 256

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tempinbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tempinbox}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "password_encryption=scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tempinbox}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 128

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 128M
          pids: 64

  caddy:
    image: caddy:2-alpine
    environment:
      TEMPINBOX_API_DOMAIN: ${TEMPINBOX_API_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128M
          pids: 64

networks:
  frontend:
  backend:
    internal: true

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  redis_data:
