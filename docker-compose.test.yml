services:
  api:
    build: .
    ports:
      - "8000:8000"
      - "2525:2525"
    environment:
      TEMPINBOX_DATABASE_URL: postgresql+asyncpg://tempinbox:tempinbox@postgres:5432/tempinbox
      TEMPINBOX_REDIS_URL: redis://redis:6379/0
      TEMPINBOX_MASTER_KEY: integration-test-key
      TEMPINBOX_SMTP_DOMAINS: '["tempinbox.dev"]'
      TEMPINBOX_RATE_LIMIT_PER_MINUTE: 1000
      TEMPINBOX_MESSAGE_TTL_HOURS: 72
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tempinbox
      POSTGRES_PASSWORD: tempinbox
      POSTGRES_DB: tempinbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempinbox"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
